<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inside Speakers · 기업 교육 연사 섭외 플랫폼</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="styles/app.css?v=italic2" />
<style>
  /* Responsive overrides — grid column counts driven by --grid-cols */
  .speaker-grid,
  .related-grid,
  .reviews-grid,
  .videos-grid,
  .cat-grid,
  .hero-grid,
  .detail-hero,
  .bio-grid,
  .stats-grid,
  .form-grid,
  .cta-grid,
  .footer-grid,
  .section-head {
    /* baselines defined inline */
  }
  .speaker-grid { grid-template-columns: repeat(var(--grid-cols, 4), 1fr) !important; }
  @media (max-width: 1180px) {
    .speaker-grid, .related-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .hero-grid, .detail-hero, .bio-grid, .cta-grid, .footer-grid, .section-head {
      grid-template-columns: 1fr !important;
      gap: 40px !important;
    }
  }
  @media (max-width: 780px) {
    :root { --nav-h: 60px; }
    .speaker-grid, .related-grid, .reviews-grid, .videos-grid, .form-grid, .stats-grid {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }
    .cat-grid { grid-template-columns: 1fr !important; }
    .nav-desktop { display: none !important; }
    h1.serif { font-size: 48px !important; }
    h2.serif { font-size: 32px !important; }
    .ds-page, .wrap { padding: 0 20px !important; }
  }
  @media (min-width: 781px) {
    .nav-mobile-trigger { display: none !important; }
  }
</style>
</head>
<body class="theme-light">
  <div id="root"></div>

  <!-- Data first -->
  <script src="data/categories.js"></script>
  <script src="data/speakers.js"></script>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.0.24/dist/framer-motion.js"></script>

  <!-- Components -->
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/Chrome.jsx"></script>
  <script type="text/babel" src="components/SpeakerCard.jsx"></script>
  <script type="text/babel" src="components/Inquiry.jsx"></script>
  <script type="text/babel" src="components/HomePage.jsx?v=italic2"></script>
  <script type="text/babel" src="components/CategoryPage.jsx"></script>
  <script type="text/babel" src="components/SpeakerDetail.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>
</body>
</html>
